<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AERIS — Enterprise Telemetry</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Outfit', 'sans-serif'], mono: ['Space Mono', 'monospace'] } } } }</script>
  <style>
    body { background: linear-gradient(-45deg, #020617, #0f172a, #082f49, #020617); background-size: 400% 400%; animation: gradientBG 20s ease infinite; color: #e2e8f0; min-height: 100vh; }
    @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .glass-card { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5); border-radius: 24px; }
    .glow-good { box-shadow: 0 0 30px rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2); }
    .glow-poor { box-shadow: 0 0 30px rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.3); }
    .turbine-ring { position: absolute; right: -20px; bottom: -40px; width: 140px; height: 140px; border-radius: 50%; border: 2px dashed rgba(56, 189, 248, 0.2); border-top: 2px solid rgba(56, 189, 248, 0.8); animation: spin 0.6s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="p-4 sm:p-8 flex flex-col items-center">
  <header class="w-full max-w-6xl flex justify-between items-end mb-8 border-b border-slate-700/50 pb-4">
    <div>
      <h1 class="text-4xl font-bold text-white tracking-widest">AERIS<span class="text-cyan-500">.</span></h1>
      <p class="font-mono text-xs text-slate-400 mt-1 uppercase tracking-widest">Enterprise Air Quality Analytics</p>
    </div>
    <div id="connection-status" class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 font-mono text-xs shadow-[0_0_15px_rgba(6,182,212,0.2)]">Live Sync</div>
  </header>
  <main class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-12 gap-6">
    <div id="main-card" class="glass-card p-8 md:col-span-8 transition-all duration-700 glow-good flex flex-col justify-between h-full relative overflow-hidden">
      <div class="absolute -top-32 -left-32 w-64 h-64 bg-emerald-500/5 rounded-full blur-3xl" id="card-glow"></div>
      <div class="flex justify-between items-start z-10">
        <div><h2 class="font-mono text-sm text-slate-400 uppercase tracking-wider">PM Airborne Particulates</h2></div>
        <span id="aqi-pill" class="px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest bg-emerald-500/20 text-emerald-400 border border-emerald-500/50">CLEAN</span>
      </div>
      <div class="mt-8 flex items-baseline gap-3 z-10">
        <span id="dust-value" class="text-8xl font-light text-white tracking-tighter">0.00</span>
        <span class="font-mono text-lg text-slate-400">mg/m³</span>
      </div>
      <div class="mt-2 flex items-baseline gap-3 z-10">
        <span class="font-mono text-sm text-slate-500">Raw Gas Level:</span>
        <span id="gas-value" class="font-mono text-lg text-indigo-400">--</span>
      </div>
      <div class="w-full h-40 mt-6 z-10"><canvas id="aqiChart"></canvas></div>
    </div>
    <div class="md:col-span-4 flex flex-col gap-6">
      <div class="glass-card p-6 grid grid-cols-2 gap-4">
        <div class="border-r border-slate-700/50 pr-4">
          <h2 class="font-mono text-[10px] text-slate-400 uppercase tracking-widest mb-2">Ambient Temp</h2>
          <div class="flex items-baseline gap-1"><span id="temp-value" class="text-4xl font-light text-orange-200">--</span><span class="font-mono text-sm text-slate-500">°C</span></div>
        </div>
        <div class="pl-2">
          <h2 class="font-mono text-[10px] text-slate-400 uppercase tracking-widest mb-2">Humidity</h2>
          <div class="flex items-baseline gap-1"><span id="hum-value" class="text-4xl font-light text-blue-200">--</span><span class="font-mono text-sm text-slate-500">%</span></div>
        </div>
      </div>
      <div class="glass-card p-6 flex flex-col justify-center relative overflow-hidden h-40">
        <h2 class="font-mono text-[10px] text-slate-400 uppercase tracking-widest mb-2">Centrifugal Exhaust [AUTO]</h2>
        <div class="flex items-baseline gap-2 z-10"><span class="text-5xl font-light text-white">80</span><span class="font-mono text-sm text-cyan-500">% RPM</span></div>
        <div class="turbine-ring" style="animation: spin 0.6s linear infinite; border-color: rgba(56, 189, 248, 0.6);"></div>
      </div>
    </div>
  </main>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    const firebaseConfig = { apiKey: "AIzaSyCeQan2EK1OQVxhsDMsQ793mHdl4LxuMwI", authDomain: "aeris-monitor.firebaseapp.com", databaseURL: "https://aeris-monitor-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "aeris-monitor" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const openWeatherApiKey = "debaf8332fe1c13d376a802859a470fc"; 

    const ctx = document.getElementById('aqiChart').getContext('2d');
    let gradient = ctx.createLinearGradient(0, 0, 0, 150); gradient.addColorStop(0, 'rgba(16, 185, 129, 0.4)'); gradient.addColorStop(1, 'rgba(16, 185, 129, 0.0)');
    const aqiChart = new Chart(ctx, { type: 'line', data: { labels: Array(25).fill(''), datasets: [{ data: Array(25).fill(0), borderColor: '#34d399', borderWidth: 2.5, backgroundColor: gradient, fill: true, tension: 0.5, pointRadius: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false, min: 0 } }, animation: { duration: 800 } } });

    onValue(ref(db, '/aeris/live'), (snapshot) => {
      const data = snapshot.val(); if (!data) return;
      const dust = data.dust_density ?? 0; const gas = data.mq135_raw ?? 0;
      document.getElementById('dust-value').textContent = dust.toFixed(2);
      document.getElementById('gas-value').textContent = gas;
      
      const isPolluted = (data.status === "POOR");
      const pill = document.getElementById('aqi-pill'); const mainCard = document.getElementById('main-card'); const cardGlow = document.getElementById('card-glow');
      
      if(!isPolluted) { 
        mainCard.className = "glass-card p-8 md:col-span-8 transition-all duration-1000 glow-good flex flex-col justify-between h-full relative overflow-hidden";
        cardGlow.className = "absolute -top-32 -left-32 w-64 h-64 bg-emerald-500/10 rounded-full blur-3xl";
        pill.className = "px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest bg-emerald-500/20 text-emerald-400 border border-emerald-500/50";
        pill.textContent = "CLEAN";
        aqiChart.data.datasets[0].borderColor = "#34d399";
      } else { 
        mainCard.className = "glass-card p-8 md:col-span-8 transition-all duration-1000 glow-poor flex flex-col justify-between h-full relative overflow-hidden";
        cardGlow.className = "absolute -top-32 -left-32 w-64 h-64 bg-red-500/10 rounded-full blur-3xl";
        pill.className = "px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest bg-red-500/20 text-red-400 border border-red-500/50";
        pill.textContent = "POOR (Filtering)";
        aqiChart.data.datasets[0].borderColor = "#ef4444";
      }
      aqiChart.data.datasets[0].data.push(dust); aqiChart.data.datasets[0].data.shift(); aqiChart.update();
    });

    async function fetchLocalClimate() {
      try {
        const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Chennai,IN&units=metric&appid=${openWeatherApiKey}`);
        const data = await response.json();
        document.getElementById('temp-value').textContent = Math.round(data.main.temp); document.getElementById('hum-value').textContent = data.main.humidity;
      } catch (error) {}
    }
    fetchLocalClimate(); setInterval(fetchLocalClimate, 600000);
  </script>
</body>
</html>
